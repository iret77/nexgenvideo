  adaptations:
  - adaptation_id: high-energy-half-time
    when:
      axis: energy_level
      operator: above
      values: []
      threshold: 0.8
    actions:
    - lever: edit_pacing
      directive: Phrase cuts in half-time groups and reserve rapid montage for section peaks.
    - lever: section_arc
      directive: Preserve intimate visual breathing rooms between high-energy passages.
    maximum_recommended_fit: 72.0
    evidence_ids:
    - editorial-fit
  - adaptation_id: fast-track-phrase-over-beat
    when:
      axis: perceived_bpm
      operator: above
      values: []
      threshold: 180.0
    actions:
    - lever: edit_pacing
      directive: Cut to phrases, gestures and emotional turns instead of tracking every beat.
    - lever: transitions
      directive: Use temporal smears or step-printing selectively to absorb speed without losing atmosphere.
    maximum_recommended_fit: 70.0
    evidence_ids:
    - six-days-measured
    - editorial-fit
  - adaptation_id: micro-budget-neon-room
    when:
      axis: budget_tier
      operator: equals
      values:
      - micro
      threshold: null
    actions:
    - lever: production
      directive: Concentrate the concept in one controllable location with layered foreground architecture.
    - lever: lighting
      directive: Build the palette from motivated practicals, signage and one dominant sequence color.
    - lever: color
      directive: Prioritize color separation and temporal texture over broad VFX coverage.
    maximum_recommended_fit: 68.0
    evidence_ids:
    - wkw-doyle-documented
    - editorial-fit
