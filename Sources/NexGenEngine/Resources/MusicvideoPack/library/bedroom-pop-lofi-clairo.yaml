id: bedroom-pop-lofi-clairo
name: "Bedroom-Pop Lo-Fi — Clairo / Mac DeMarco school"
description: |
  Lo-Fi, einfache Aesthetik aus dem Bedroom-Pop: Self-Recording-
  Look, Macbook-Photo-Booth-Cam, ein Zimmer, sichtbare Imperfektion.
  Vorbild Clairo's "Pretty Girl" (2017, in 30 Minuten im Kinder-
  zimmer aufgenommen) und Mac DeMarco's Vintage-Bias. Fuer authentisch-
  intime Indie-Tracks ohne Production-Bombast.

triggers:
  visual_mediums: [live_action_realistic, live_action_stylized, mixed]
  moods: [intimate, melancholic, introspective, dreamy]
  tempo_bands: [slow, medium]
  concept_types: [performance, narrative, hybrid, documentary]
  figures: [artist_only]
  aspect_ratios: []

