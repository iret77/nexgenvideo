section_arc:
  - role: establishing
    framing_hint: [ms, mcu]
    notes: "Performer in seinem Raum — Bett, Schreibtisch, sichtbares Kabel-Spaghetti."
  - role: detail
    framing_hint: [cu, ecu]
    notes: "Imperfektionen werden gefeiert — Pickel, ungemachtes Haar, schiefe Brille."
  - role: cutaway
    framing_hint: [insert]
    notes: "Objekt-Insert: Tee, Kassette, Buch, Foto-Sammlung."
  - role: resolve
    framing_hint: [ms]
    notes: "Zurueck zur ruhigen Mittel-Distanz."

framing_mix:
  wide_pct: 0
  full_pct: 5
  ms_pct: 30
  mcu_pct: 25
  cu_pct: 25
  ecu_pct: 5
  ots_pct: 0
  pov_pct: 0
  insert_pct: 10
  aerial_pct: 0

asl_range:
  min_s: 4.0
  max_s: 15.0
  typical_s: 7.0

camera_vocabulary:
  - "static handheld laptop cam"
  - "self-shot iPhone hold"
  - "gentle natural-light push"
  - "deliberate camera shake (authenticity marker)"

lighting_signature: |
  available room light (window, bedside lamp, fairy lights),
  unmotivated colour bias (often warm yellow tungsten or cool
  daylight), low-contrast, deliberate over- or under-exposure as
  authenticity marker, no rim or fill.

approximation_basis: |
  Aggregation of the cited Wikipedia, FADER interview, Hypebeast,
  Cherwell, Medium, Kore Studios and Hotel Ugly articles describing
  Clairo's self-recorded Pretty Girl approach and the broader
  bedroom-pop "DIY authenticity" aesthetic. Specific framing_mix
  derived qualitatively, not Cinemetrics-grade.
