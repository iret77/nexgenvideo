id: indie-ballad-corbijn-coppola
name: "Indie Ballad — Corbijn / Coppola school"
description: |
  Reduziert, atmosphaerisch, oft single-Location oder ein klar
  abgegrenzter Welt-Ausschnitt. Bild-Komposition steht ueber Action.
  Vorbild: Anton Corbijn (Depeche Mode, Joy Division, U2) und Sofia
  Coppola (The Virgin Suicides-Aesthetik, Romy Mars, Phoenix). Bestens
  fuer langsame Ballads mit hohem Stimmungsanteil.

triggers:
  visual_mediums: [live_action_realistic, live_action_stylized]
  moods: [introspective, melancholic, dreamy, intimate, cinematic]
  tempo_bands: [slow, medium]
  concept_types: [narrative, performance, hybrid, abstract]
  figures: [artist_only, artist_plus_others]
  aspect_ratios: []

references:
