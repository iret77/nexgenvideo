section_arc:
  - role: establishing
    framing_hint: [wide, ms]
    notes: "Stimmungs-Anker, oft schon mit Subject — 1 pro Section."
  - role: reveal
    framing_hint: [mcu, ms]
    notes: "Performer in der Atmosphaere, ruhig."
  - role: detail
    framing_hint: [cu, ecu]
    notes: "Augen, Atmen, Lippen — emotionale Naehe."
  - role: resolve
    framing_hint: [ms, full]
    notes: "Rueck zum Mittel-Body, gelegentlich Wide-Echo."

framing_mix:
  wide_pct: 10
  full_pct: 5
  ms_pct: 30
  mcu_pct: 25
  cu_pct: 20
  ecu_pct: 5
  ots_pct: 5
  pov_pct: 0
  insert_pct: 0
  aerial_pct: 0

asl_range:
  min_s: 3.0
  max_s: 10.0
  typical_s: 5.5

camera_vocabulary:
  - "static hold"
  - "slow push-in"
  - "gentle handheld"
  - "single dolly move per phrase"

lighting_signature: |
  black-and-white frequent in Corbijn work, otherwise muted natural
  light with single window/lamp key, soft fall-off, low saturation.

approximation_basis: |
  Aggregation of the cited Wikipedia, Musée Magazine, IMVDb and IMDb
  pages describing Corbijn's reduced black-and-white portrait style
  and Coppola's restrained naturalist aesthetic. Specific ASL and
  framing distribution vary per video.
