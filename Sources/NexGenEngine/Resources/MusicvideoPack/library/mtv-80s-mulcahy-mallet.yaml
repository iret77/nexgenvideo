id: mtv-80s-mulcahy-mallet
name: "80s MTV — Mulcahy / Mallet / MGMM era"
description: |
  Klassische 80er-MTV-Aesthetik in der Tradition von Russell Mulcahy
  ("Video Killed the Radio Star", Duran Duran-Klassiker) und David
  Mallet (Queen — Bohemian Rhapsody, David Bowie — Ashes to Ashes).
  Schnelle Cuts auf Beat, Tracking-Shots, Neon-Lichter, Wind-bewegte
  Stoffe, Spot-Color-Akzente, faux-widescreen. Empfohlen fuer
  retro-poppige Tracks oder bewusst nostalgische Performance-Konzepte.

triggers:
  visual_mediums: [live_action_realistic, live_action_stylized, mixed]
  moods: [euphoric, high_energy, dreamy, cinematic]
  tempo_bands: [medium, uptempo, fast]
  concept_types: [performance, narrative, hybrid]
  figures: [artist_only, artist_plus_others]
  aspect_ratios: []

