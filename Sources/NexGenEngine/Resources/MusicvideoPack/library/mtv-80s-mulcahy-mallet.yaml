section_arc:
  - role: establishing
    framing_hint: [wide, full]
    notes: "Performer-im-Set Establishing — Bandstage, Studio, Neon-Strasse."
  - role: performance
    framing_hint: [ms, mcu]
    notes: "Beat-getaktete Performer-Shots, oft frontal mit Profil-Wechsel."
  - role: reveal
    framing_hint: [cu, ecu]
    notes: "Augen, Mund, Hand am Instrument — auf Hook-Beats."
  - role: cutaway
    framing_hint: [insert, ots]
    notes: "Spot-Color-Detail, fan-bewegtes Tuch, Glitter-Akzent."

framing_mix:
  wide_pct: 15
  full_pct: 10
  ms_pct: 30
  mcu_pct: 20
  cu_pct: 15
  ecu_pct: 5
  ots_pct: 0
  pov_pct: 0
  insert_pct: 5
  aerial_pct: 0

asl_range:
  min_s: 0.5
  max_s: 3.0
  typical_s: 1.5

camera_vocabulary:
  - "rapid tracking shot"
  - "snap zoom on hook"
  - "fan-blown wind motion"
  - "tilt across neon facade"
  - "spot-color in monochrome frame"

lighting_signature: |
  hard neon and tungsten practicals, glowing rim-lights, theatrical
  haze, saturated single-colour washes (red, magenta, cyan), faux-
  widescreen mat with deliberate aspect crop.

approximation_basis: |
  Aggregation of the cited Wikipedia, IMVDb, Billboard and Duran
  Duran official interviews describing Mulcahy's "fast cuts,
  tracking shots, glowing lights, neo-noir lighting, windblown
  drapery, fans, spot color, body painting, glass matte shots and
  faux widescreen aspect ratio". Pace values approximate the genre's
  typical 80s MTV range.
