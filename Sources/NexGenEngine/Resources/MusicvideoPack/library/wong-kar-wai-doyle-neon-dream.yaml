id: wong-kar-wai-doyle-neon-dream
name: "Asian Arthouse — Wong Kar-wai / Christopher Doyle neon dream"
description: |
  Neon-getraenkte, traumartige Hong-Kong-Aesthetik in der Schule
  Wong Kar-wai + Christopher Doyle. Step-Printing-Slow-Motion
  (rhythmisches Frame-Drop), enge Kompositionen mit 50mm+ Lenses,
  Curve-betonte Linien, melancholische Farbcodierung pro Sequenz.
  Empfohlen fuer Tracks mit zerdehnter Zeit-Empfindung, Sehnsuchts-
  Bogen und urbaner Nacht-Stimmung.

