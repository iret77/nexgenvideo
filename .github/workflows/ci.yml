name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['engine/**', 'packs/**', 'docs/**', '**/*.md']
  pull_request:
    paths-ignore: ['engine/**', 'packs/**', 'docs/**', '**/*.md']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # PalmierPro targets macOS 26 (Tahoe), arm64 only. Requires a macOS 26 runner image.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  bundle-app:
    name: Bundle .app
    # Smoke-test that the debug .app still assembles (no secrets, no local build) and keep it as a CI
    # artifact. The public `dev-latest` download is the SIGNED + notarized DMG published by release.yml
    # — ci.yml no longer writes that release.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Bundle (debug, ad-hoc signed)
        run: scripts/bundle.sh debug

      - name: Zip .app
        run: ditto -c -k --keepParent .build/NexGenVideo.app .build/NexGenVideo.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexGenVideo-app
          path: .build/NexGenVideo.zip
          if-no-files-found: error
