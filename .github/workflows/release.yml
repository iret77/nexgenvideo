name: Release (signed + notarized)

# Signs with OUR Developer ID (cert imported into a temp keychain, identity auto-detected),
# notarizes via the App Store Connect API key, staples, builds a DMG, EdDSA-signs it for Sparkle,
# and publishes a GitHub release + appcast entry. No local build — everything runs here.
#
# Secrets (repo): MACOS_CERTIFICATE_P12_BASE64, MACOS_CERTIFICATE_PASSWORD, MACOS_NOTARY_KEY_ID,
# MACOS_NOTARY_ISSUER_ID, MACOS_NOTARY_KEY_P8_BASE64, SPARKLE_ED_PRIVATE_KEY (base64 of the DER
# Ed25519 private key; if absent, Sparkle signing + appcast are skipped).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version X.Y.Z"
        required: true
        type: string
      dry_run:
        description: "Build + sign + notarize only (upload DMG artifact); skip release, appcast, commit"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "version must be X.Y.Z (got '${{ inputs.version }}')"; exit 1; }

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PW" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/"//g')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/{print $2; exit}')"
          [ -n "$IDENTITY" ] || { echo "No 'Developer ID Application' identity in the .p12"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Prepare notary + Sparkle keys
        env:
          NOTARY_KEY_B64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          SPARKLE_PRIV_B64: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$NOTARY_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          {
            echo "NOTARY_KEY_FILE=$RUNNER_TEMP/notary.p8"
            echo "NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "NOTARY_ISSUER=$NOTARY_ISSUER"
          } >> "$GITHUB_ENV"
          if [ -n "${SPARKLE_PRIV_B64:-}" ]; then
            printf '%s' "$SPARKLE_PRIV_B64" | base64 --decode > "$RUNNER_TEMP/sparkle_priv.der"
            echo "SPARKLE_PRIV_DER=$RUNNER_TEMP/sparkle_priv.der" >> "$GITHUB_ENV"
          fi

      - name: Bump version
        run: |
          set -euo pipefail
          PLIST="Sources/PalmierPro/Resources/Info.plist"
          CUR="$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")"
          NEW=$((CUR + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" "$PLIST"
          echo "BUILD_NUMBER=$NEW" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple (DMG)
        run: scripts/bundle.sh release --dist

      - name: Verify signature + notarization
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 .build/NexGenVideo.app
          xcrun stapler validate .build/NexGenVideo.app
          xcrun stapler validate .build/NexGenVideo.dmg
          spctl -a -vvv -t install .build/NexGenVideo.dmg || true

      - name: EdDSA-sign DMG for Sparkle
        if: ${{ env.SPARKLE_PRIV_DER != '' }}
        run: |
          set -euo pipefail
          SIG="$(openssl pkeyutl -sign -rawin -keyform DER -inkey "$SPARKLE_PRIV_DER" \
            -in .build/NexGenVideo.dmg | base64)"
          {
            echo "ED_SIGNATURE=$SIG"
            echo "DMG_LENGTH=$(stat -f%z .build/NexGenVideo.dmg)"
          } >> "$GITHUB_ENV"

      - name: Upload DMG artifact (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: NexGenVideo-dmg
          path: .build/NexGenVideo.dmg
          if-no-files-found: error

      - name: Publish GitHub release + appcast
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/PalmierPro/Resources/Info.plist
          git commit -m "release: bump to ${{ inputs.version }} (build ${BUILD_NUMBER})"
          if [ -n "${ED_SIGNATURE:-}" ]; then
            python3 scripts/update_appcast.py "${{ inputs.version }}" "$BUILD_NUMBER" "$DMG_LENGTH" "$ED_SIGNATURE" "$TAG"
            git add appcast.xml
            git commit -m "release: appcast for $TAG"
          fi
          git push origin "HEAD:${{ github.ref_name }}"
          gh release create "$TAG" .build/NexGenVideo.dmg \
            --title "NexGen Video $TAG" \
            --notes "NexGen Video ${{ inputs.version }} (build ${BUILD_NUMBER})." \
            --target "$(git rev-parse HEAD)"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "${SIGN_KEYCHAIN:-}" 2>/dev/null || true
