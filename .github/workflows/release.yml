name: Release (signed + notarized)

# Signs with OUR Developer ID (cert imported into a temp keychain, identity auto-detected),
# notarizes via the App Store Connect API key, staples, builds a DMG, EdDSA-signs it for Sparkle,
# and publishes a GitHub release + appcast entry. No local build — everything runs here.
#
# Secrets (repo): MACOS_CERTIFICATE_P12_BASE64, MACOS_CERTIFICATE_PASSWORD, MACOS_NOTARY_KEY_ID,
# MACOS_NOTARY_ISSUER_ID, MACOS_NOTARY_KEY_P8_BASE64, SPARKLE_ED_PRIVATE_KEY (base64 of the DER
# Ed25519 private key; required for a published release, optional for a dry run).

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version X.Y.Z"
        required: true
        type: string
      dry_run:
        description: "Build, sign, notarize, and publish an isolated preview channel; skip stable release/appcast/commit"
        required: false
        default: true
        type: boolean
  # `workflow_dispatch` is the ONLY trigger. Nothing a commit, a merge, or a PR touches may start a
  # signed build — not the bundling scripts, not the pack manifests, not this file. A build happens
  # when a human asks for one, never as a side effect of changing code. Do not add `push:` or
  # `pull_request:` here: correctness of the app is verified by ci.yml (build + test) on every PR;
  # this workflow only produces and publishes artifacts, and that is a deliberate act.

permissions: {}

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      publication-resumed: ${{ steps.publication-state.outputs.resumed }}
    permissions:
      contents: write
      issues: read
    steps:
      - name: Reject open release blockers
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label view release-blocker --repo "$GITHUB_REPOSITORY" >/dev/null
          BLOCKERS="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label release-blocker \
            --limit 100 \
            --json number,title \
            --jq '.[] | "#\(.number) \(.title)"')"
          if [ -n "$BLOCKERS" ]; then
            echo "::error::Release blocked before macOS runner allocation"
            echo "$BLOCKERS"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Inspect or resume release publication
        if: ${{ inputs.dry_run == false }}
        id: publication-state
        env:
          GH_TOKEN: ${{ github.token }}
          REL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v$REL_VERSION"
          PENDING_ASSET="catalog-${REL_VERSION}.pending.json"
          TRANSACTION_ASSET="release-${REL_VERSION}.transaction.json"
          COMPLETE_ASSET="release-${REL_VERSION}.complete.json"
          STATE_DIR="$RUNNER_TEMP/release-state"
          mkdir -p "$STATE_DIR"

          PLUGIN_ASSETS=""
          if gh release view plugins \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' > "$STATE_DIR/plugin-assets.txt" 2>/dev/null; then
            PLUGIN_ASSETS="$(cat "$STATE_DIR/plugin-assets.txt")"
          fi
          asset_exists() {
            echo "$PLUGIN_ASSETS" | grep -Fxq "$1"
          }

          if asset_exists "$COMPLETE_ASSET"; then
            echo "::error::Release $REL_VERSION is already completely published"
            exit 1
          fi

          HAS_RELEASE=false
          if gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' > "$STATE_DIR/release-assets.txt" 2>/dev/null; then
            HAS_RELEASE=true
            grep -Fxq NexGenVideo.dmg "$STATE_DIR/release-assets.txt" \
              || { echo "::error::release $TAG exists without NexGenVideo.dmg"; exit 1; }
          fi
          HAS_APPCAST=false
          if python3 - "$REL_VERSION" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          version = sys.argv[1]
          root = ET.parse("appcast.xml").getroot()
          namespace = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"
          found = any(
              item.findtext(f"{namespace}shortVersionString") == version
              for item in root.findall("./channel/item")
          )
          raise SystemExit(0 if found else 1)
          PY
          then
            HAS_APPCAST=true
          fi

          if [ "$HAS_RELEASE" = "false" ] && [ "$HAS_APPCAST" = "false" ]; then
            echo "resumed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HAS_RELEASE" = "false" ]; then
            echo "::error::appcast.xml already advertises $REL_VERSION but release $TAG is absent"
            exit 1
          fi
          if ! asset_exists "$PENDING_ASSET" || ! asset_exists "$TRANSACTION_ASSET"; then
            echo "::error::Release $TAG already exists without a resumable plugin publication transaction"
            exit 1
          fi

          gh release download plugins \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$PENDING_ASSET" \
            --pattern "$TRANSACTION_ASSET" \
            --dir "$STATE_DIR"
          TRANSACTION="$STATE_DIR/$TRANSACTION_ASSET"
          PENDING="$STATE_DIR/$PENDING_ASSET"
          jq -e '
            .schema == "release-publication/1"
            and (.catalog_sha256 | test("^[0-9a-f]{64}$"))
            and (.assets | type == "array" and length > 0)
            and all(.assets[];
              (.name | type == "string" and length > 0)
              and (.sha256 | test("^[0-9a-f]{64}$"))
            )
          ' "$TRANSACTION" >/dev/null \
            || { echo "::error::publication transaction schema mismatch"; exit 1; }
          [ "$(jq -r .version "$TRANSACTION")" = "$REL_VERSION" ] \
            || { echo "::error::publication transaction version mismatch"; exit 1; }
          [ "$(jq -r .tag "$TRANSACTION")" = "$TAG" ] \
            || { echo "::error::publication transaction tag mismatch"; exit 1; }
          EXPECTED_CATALOG_SHA="$(jq -r .catalog_sha256 "$TRANSACTION")"
          ACTUAL_CATALOG_SHA="$(sha256sum "$PENDING" | awk '{print $1}')"
          [ "$ACTUAL_CATALOG_SHA" = "$EXPECTED_CATALOG_SHA" ] \
            || { echo "::error::pending catalog checksum mismatch"; exit 1; }
          jq -e '.schema == "plugins/v2" and (.plugins | type == "array")' "$PENDING" >/dev/null \
            || { echo "::error::pending catalog schema is invalid"; exit 1; }
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/plugins"
          while IFS= read -r ASSET_URL; do
            case "$ASSET_URL" in
              "$BASE"/*) ;;
              *) echo "::error::pending catalog references a non-stable channel"; exit 1 ;;
            esac
            asset_exists "${ASSET_URL##*/}" \
              || { echo "::error::pending catalog references missing asset ${ASSET_URL##*/}"; exit 1; }
          done < <(jq -r '.plugins[] | .url, (.badge // empty)' "$PENDING")
          ASSET_DIR="$STATE_DIR/assets"
          mkdir -p "$ASSET_DIR"
          while IFS=$'\t' read -r ASSET_NAME ASSET_SHA; do
            asset_exists "$ASSET_NAME" \
              || { echo "::error::publication transaction references missing asset $ASSET_NAME"; exit 1; }
            gh release download plugins \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$ASSET_NAME" \
              --dir "$ASSET_DIR"
            DOWNLOADED_SHA="$(sha256sum "$ASSET_DIR/$ASSET_NAME" | awk '{print $1}')"
            [ "$DOWNLOADED_SHA" = "$ASSET_SHA" ] \
              || { echo "::error::published asset checksum mismatch for $ASSET_NAME"; exit 1; }
          done < <(jq -r '.assets[] | [.name, .sha256] | @tsv' "$TRANSACTION")

          if [ "$HAS_APPCAST" = "false" ]; then
            BUILD_NUMBER="$(jq -r .build_number "$TRANSACTION")"
            DMG_LENGTH="$(jq -r .dmg_length "$TRANSACTION")"
            ED_SIGNATURE="$(jq -r .ed_signature "$TRANSACTION")"
            git fetch --no-tags origin "$GITHUB_REF_NAME"
            git checkout --detach FETCH_HEAD
            python3 scripts/update_appcast.py \
              "$REL_VERSION" "$BUILD_NUMBER" "$DMG_LENGTH" "$ED_SIGNATURE" "$TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add appcast.xml
            git commit -m "release: appcast for $TAG"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

          cp "$PENDING" "$STATE_DIR/catalog.json"
          for ATTEMPT in 1 2 3 4 5; do
            if gh release upload plugins \
              --repo "$GITHUB_REPOSITORY" \
              "$STATE_DIR/catalog.json" \
              --clobber; then
              break
            fi
            [ "$ATTEMPT" -lt 5 ] || exit 1
            sleep $((ATTEMPT * 2))
          done
          cp "$TRANSACTION" "$STATE_DIR/$COMPLETE_ASSET"
          gh release upload plugins \
            --repo "$GITHUB_REPOSITORY" \
            "$STATE_DIR/$COMPLETE_ASSET" \
            --clobber
          echo "resumed=true" >> "$GITHUB_OUTPUT"
          echo "Publication for $REL_VERSION resumed without allocating a macOS runner"

      - name: Release source preflight
        if: ${{ steps.publication-state.outputs.resumed != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          CATALOG_DIR="$RUNNER_TEMP/plugin-channel"
          mkdir -p "$CATALOG_DIR"
          if gh release view plugins \
            --repo "$GITHUB_REPOSITORY" \
            --json assets > "$CATALOG_DIR/assets.json" 2>/dev/null; then
            if jq -e 'any(.assets[]; .name == "catalog.json")' \
              "$CATALOG_DIR/assets.json" >/dev/null; then
              gh release download plugins \
                --repo "$GITHUB_REPOSITORY" \
                --pattern catalog.json \
                --dir "$CATALOG_DIR"
            else
              if jq -e 'any(.assets[]; .name | test("^release-.*[.]complete[.]json$"))' \
                "$CATALOG_DIR/assets.json" >/dev/null; then
                echo "::error::stable plugin catalog is missing after a completed publication"
                exit 1
              fi
              printf '%s\n' '{"schema":"plugins/v2","plugins":[]}' > "$CATALOG_DIR/catalog.json"
            fi
          else
            printf '%s\n' '{"schema":"plugins/v2","plugins":[]}' > "$CATALOG_DIR/catalog.json"
          fi
          python3 scripts/release_preflight.py "$REL_VERSION" "$CATALOG_DIR/catalog.json"

  release:
    needs: release-gate
    if: ${{ needs.release-gate.outputs.publication-resumed != 'true' }}
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + mode
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "version must be X.Y.Z (got '$V')"; exit 1; }
          DRY="${{ inputs.dry_run }}"
          {
            echo "REL_VERSION=$V"
            echo "REL_DRY=$DRY"
          } >> "$GITHUB_ENV"
          if [ "$DRY" = "true" ]; then
            PREVIEW_TAG="preview-${{ github.run_id }}"
            {
              echo "PLUGIN_CHANNEL_TAG=$PREVIEW_TAG"
              echo "PLUGIN_CATALOG_URL=${{ github.server_url }}/${{ github.repository }}/releases/download/$PREVIEW_TAG/catalog.json"
            } >> "$GITHUB_ENV"
          else
            {
              echo "PLUGIN_CHANNEL_TAG=plugins"
              echo "PLUGIN_CATALOG_URL=${{ github.server_url }}/${{ github.repository }}/releases/download/plugins/catalog.json"
            } >> "$GITHUB_ENV"
          fi
          echo "Building $V (dry=${{ inputs.dry_run }})"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PW" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/"//g')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/{print $2; exit}')"
          [ -n "$IDENTITY" ] || { echo "No 'Developer ID Application' identity in the .p12"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Prepare notary + Sparkle keys
        env:
          NOTARY_KEY_B64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          SPARKLE_PRIV_B64: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$NOTARY_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          {
            echo "NOTARY_KEY_FILE=$RUNNER_TEMP/notary.p8"
            echo "NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "NOTARY_ISSUER=$NOTARY_ISSUER"
          } >> "$GITHUB_ENV"
          if [ -n "${SPARKLE_PRIV_B64:-}" ]; then
            printf '%s' "$SPARKLE_PRIV_B64" | base64 --decode > "$RUNNER_TEMP/sparkle_priv.der"
            echo "SPARKLE_PRIV_DER=$RUNNER_TEMP/sparkle_priv.der" >> "$GITHUB_ENV"
          elif [ "$REL_DRY" = "false" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY is required for a published release"
            exit 1
          fi

      - name: Validate release credentials and DMG tooling
        run: |
          set -euo pipefail
          xcrun notarytool history \
            --key "$NOTARY_KEY_FILE" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER" >/dev/null
          if [ -n "${SPARKLE_PRIV_DER:-}" ]; then
            openssl pkey -inform DER -in "$SPARKLE_PRIV_DER" -noout
          fi
          DMG_VENV="$RUNNER_TEMP/dmgvenv"
          python3 -m venv "$DMG_VENV"
          "$DMG_VENV/bin/pip" install \
            --quiet \
            --disable-pip-version-check \
            "dmgbuild==1.6.7"
          [ -x "$DMG_VENV/bin/dmgbuild" ]
          echo "DMGBUILD_BIN=$DMG_VENV/bin/dmgbuild" >> "$GITHUB_ENV"

      - name: Bump version
        run: |
          set -euo pipefail
          PLIST="Sources/NexGenVideo/Resources/Info.plist"
          CUR="$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")"
          NEW=$((CUR + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $REL_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" "$PLIST"
          echo "BUILD_NUMBER=$NEW" >> "$GITHUB_ENV"

      - name: Test the exact release configuration
        run: |
          set +e
          export SWIFT_BACKTRACE=enable=yes,interactive=no,demangle=yes,cache=no
          attempts=3
          for i in $(seq 1 "$attempts"); do
            swift test -c release 2>&1 | tee "release-test-attempt-$i.log"
            code=${PIPESTATUS[0]}
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            if grep -qE "✘ Test|recorded an issue" "release-test-attempt-$i.log"; then
              echo "::error::Release tests failed on attempt $i"
              exit "$code"
            fi
            if grep -q "unexpected signal code" "release-test-attempt-$i.log"; then
              echo "::warning::SwiftPM test runner crashed on attempt $i — retrying"
              continue
            fi
            exit "$code"
          done
          echo "::error::SwiftPM test runner crashed on all $attempts attempts"
          exit 1

      - name: Build and sign app
        run: scripts/bundle.sh release --sign

      - name: Assemble format packs (.ngvpack + catalog entry)
        run: |
          set -euo pipefail
          # Developer ID when the signing identity is present (it is on same-repo
          # runs); the assemble script falls back to ad-hoc otherwise.
          scripts/assemble_ngvpack.sh plugins/musicvideo.json release .build/plugins "${SIGN_IDENTITY:-}"
          ls -la .build/plugins

      - name: Notarize and staple downloadable format packs
        run: |
          set -euo pipefail
          for PACK_ZIP in .build/plugins/*.ngvpack.zip; do
            [ -f "$PACK_ZIP" ] \
              || { echo "::error::no format-pack ZIP was assembled"; exit 1; }
            PACK_BUNDLE="${PACK_ZIP%.zip}"
            PACK_ID="$(basename "$PACK_BUNDLE" .ngvpack)"
            PACK_ENTRY=".build/plugins/${PACK_ID}.entry.json"
            [ -d "$PACK_BUNDLE" ] \
              || { echo "::error::missing bundle for $PACK_ZIP"; exit 1; }
            [ -f "$PACK_ENTRY" ] \
              || { echo "::error::missing catalog entry for $PACK_ZIP"; exit 1; }

            echo "notarizing $PACK_ZIP"
            xcrun notarytool submit "$PACK_ZIP" \
              --key "$NOTARY_KEY_FILE" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER" \
              --wait

            # Apple can notarize a ZIP but cannot staple the ZIP itself. Staple the nested bundle,
            # then rebuild the exact archive that users download and refresh its catalog checksum.
            xcrun stapler staple "$PACK_BUNDLE"
            xcrun stapler validate "$PACK_BUNDLE"
            codesign --verify --strict --verbose=2 "$PACK_BUNDLE"
            rm -f "$PACK_ZIP"
            /usr/bin/ditto -c -k --keepParent "$PACK_BUNDLE" "$PACK_ZIP"
            PACK_SHA="$(shasum -a 256 "$PACK_ZIP" | awk '{print $1}')"
            python3 - "$PACK_ENTRY" "$PACK_SHA" <<'PY'
          import json
          import sys

          path, sha = sys.argv[1:]
          with open(path, encoding="utf-8") as handle:
              entry = json.load(handle)
          entry["sha256"] = sha
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(entry, handle, indent=2)
              handle.write("\n")
          PY
            echo "notarized ${PACK_ID}.ngvpack sha256=$PACK_SHA"
          done

      - name: Verify pack links the SHARED engine (guards the PackEntry-cast regression)
        run: |
          set -euo pipefail
          # Same Mach-O invariant ci.yml asserts on the ad-hoc pack, now on the SIGNED release pack:
          # a `.ngvpack` must link NexGenEngine as ONE shared dynamic image with the app, not statically
          # absorb it. If absorbed, the pack carries its own `PackEntry` (ObjC `NGVPackEntry`) class, the
          # host's load-time `bundle.principalClass as? PackEntry.Type` cast fails ("entry point not
          # found"), and the pack silently never activates.
          PACK_BIN="$(ls .build/plugins/*.ngvpack/Contents/MacOS/* | head -1)"
          APP_BIN=".build/NexGenVideo.app/Contents/MacOS/NexGenVideo"
          echo "pack binary: $PACK_BIN"
          otool -L "$PACK_BIN" | grep -q '@rpath/libNexGenEngine.dylib' \
            || { echo "::error::pack does not dynamically link libNexGenEngine.dylib (engine statically absorbed)"; exit 1; }
          if nm "$PACK_BIN" | grep -E ' [SDTtbd] _OBJC_CLASS_\$_NGVPackEntry$'; then
            echo "::error::NexGenEngine is statically absorbed — pack defines its own NGVPackEntry class"; exit 1
          fi
          otool -L "$APP_BIN" | grep -q '@rpath/libNexGenEngine.dylib' \
            || { echo "::error::app does not dynamically link libNexGenEngine.dylib"; exit 1; }
          echo "OK: NexGenEngine is one shared dynamic image across app + pack"

      - name: Load-test — the SIGNED app actually loads the SIGNED pack from an EXTERNAL dir
        run: |
          set -euo pipefail
          # This is the check that was MISSING here: release.yml published the pack the app reads
          # without ever loading it, so the 0.7.6-class rpath regression (twice in the field) could ship
          # inside a signed DMG. It runs BEFORE the publish step, so a pack that can't load aborts the
          # whole release before DMG creation, notarization, or publishing.
          #
          # Stronger than ci.yml's ad-hoc run: pack AND app are Developer-ID signed here, so loading the
          # pack into the hardened-runtime app also exercises LIBRARY VALIDATION (same Team ID) — a
          # signing mismatch that ci.yml cannot see fails right here.
          #
          # Field layout: the pack lives OUTSIDE the app bundle, so its @rpath/libNexGenEngine.dylib must
          # resolve to the host's Contents/Frameworks via @executable_path/../Frameworks. The real app
          # binary loads it (gate → Bundle.load() → principalClass cast → makePack()) and exits 0 only on
          # success.
          PACK_ZIP="$(ls .build/plugins/*.ngvpack.zip | head -1)"
          PACK_EXTRACT="$(mktemp -d)"
          /usr/bin/ditto -x -k "$PACK_ZIP" "$PACK_EXTRACT"
          PACK_BUNDLE="$(ls -d "$PACK_EXTRACT"/*.ngvpack 2>/dev/null | head -1 || true)"
          [ -n "$PACK_BUNDLE" ] \
            || { echo "::error::published pack ZIP does not contain an .ngvpack bundle"; exit 1; }
          codesign --verify --strict --verbose=2 "$PACK_BUNDLE"
          xcrun stapler validate "$PACK_BUNDLE"
          PACK_BIN="$(ls "$PACK_BUNDLE"/Contents/MacOS/* 2>/dev/null | head -1 || true)"
          [ -n "$PACK_BIN" ] \
            || { echo "::error::published pack ZIP has no executable"; exit 1; }
          otool -l "$PACK_BIN" | grep -q 'path @executable_path/../Frameworks' \
            || { echo "::error::pack is missing the @executable_path/../Frameworks rpath — it can't reach the host engine"; exit 1; }
          QUARANTINE="0083;$(printf '%x' "$(date +%s)");GitHub Actions;${{ github.server_url }}"
          /usr/bin/xattr -r -w com.apple.quarantine "$QUARANTINE" "$PACK_BUNDLE"
          /usr/bin/xattr -p com.apple.quarantine "$PACK_BUNDLE"
          echo "loading the notarized, quarantined archive with the real signed app binary…"
          NGV_SELFTEST_PACK="$PACK_BUNDLE" .build/NexGenVideo.app/Contents/MacOS/NexGenVideo
          echo "OK: the signed app loaded the notarized pack under download quarantine"

      - name: Notarize app and build signed, notarized DMG
        run: scripts/bundle.sh release --package

      - name: Verify the exact DMG users install
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 .build/NexGenVideo.app
          codesign --verify --strict --verbose=2 .build/NexGenVideo.app/Contents/Frameworks/libNexGenEngine.dylib
          codesign --verify --verbose=2 .build/NexGenVideo.dmg
          xcrun stapler validate .build/NexGenVideo.app
          xcrun stapler validate .build/NexGenVideo.dmg
          hdiutil verify .build/NexGenVideo.dmg

          MOUNT_POINT="$(mktemp -d)"
          hdiutil attach .build/NexGenVideo.dmg -nobrowse -readonly -mountpoint "$MOUNT_POINT"
          cleanup_mount() {
            hdiutil detach "$MOUNT_POINT" >/dev/null 2>&1 || true
            rmdir "$MOUNT_POINT" >/dev/null 2>&1 || true
          }
          trap cleanup_mount EXIT

          [ -d "$MOUNT_POINT/NexGenVideo.app" ] \
            || { echo "::error::DMG does not contain NexGenVideo.app"; exit 1; }
          [ -L "$MOUNT_POINT/Applications" ] \
            || { echo "::error::DMG does not contain the Applications symlink"; exit 1; }
          [ "$(readlink "$MOUNT_POINT/Applications")" = "/Applications" ] \
            || { echo "::error::DMG Applications symlink has the wrong target"; exit 1; }

          INSTALL_CHECK="$(mktemp -d)"
          INSTALL_APP="$INSTALL_CHECK/NexGenVideo.app"
          ditto "$MOUNT_POINT/NexGenVideo.app" "$INSTALL_APP"
          codesign --verify --strict --verbose=2 "$INSTALL_APP"
          codesign --verify --strict --verbose=2 "$INSTALL_APP/Contents/Frameworks/libNexGenEngine.dylib"
          xcrun stapler validate "$INSTALL_APP"
          spctl -a -vvv -t exec "$INSTALL_APP"

          PACK_ZIP="$(ls .build/plugins/*.ngvpack.zip | head -1)"
          PACK_EXTRACT="$(mktemp -d)"
          /usr/bin/ditto -x -k "$PACK_ZIP" "$PACK_EXTRACT"
          PACK_BUNDLE="$(ls -d "$PACK_EXTRACT"/*.ngvpack 2>/dev/null | head -1 || true)"
          [ -n "$PACK_BUNDLE" ] \
            || { echo "::error::published pack ZIP does not contain an .ngvpack bundle"; exit 1; }
          xcrun stapler validate "$PACK_BUNDLE"
          QUARANTINE="0083;$(printf '%x' "$(date +%s)");GitHub Actions;${{ github.server_url }}"
          /usr/bin/xattr -r -w com.apple.quarantine "$QUARANTINE" "$PACK_BUNDLE"
          NGV_SELFTEST_PACK="$PACK_BUNDLE" \
            "$INSTALL_APP/Contents/MacOS/NexGenVideo"
          echo "OK: mounted DMG layout, copied app, Gatekeeper assessment, and quarantined pack load"

      - name: Publish isolated preview plugin channel
        if: ${{ env.REL_DRY == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/$PLUGIN_CHANNEL_TAG"
          python3 scripts/publish_plugin_catalog.py .build/plugins "$BASE" .build/plugins/catalog.json
          gh release view "$PLUGIN_CHANNEL_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$PLUGIN_CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "NexGenVideo $REL_VERSION preview plugin channel" \
              --notes "Build-specific preview assets for Actions run ${{ github.run_id }}."
          gh release upload "$PLUGIN_CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            .build/plugins/*-*.ngvpack.zip \
            --clobber
          if compgen -G ".build/plugins/*-*.badge.png" >/dev/null; then
            gh release upload "$PLUGIN_CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              .build/plugins/*-*.badge.png \
              --clobber
          fi
          gh release upload "$PLUGIN_CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            .build/plugins/catalog.json \
            --clobber

      - name: EdDSA-sign DMG for Sparkle
        if: ${{ env.SPARKLE_PRIV_DER != '' }}
        run: |
          set -euo pipefail
          SIG="$(openssl pkeyutl -sign -rawin -keyform DER -inkey "$SPARKLE_PRIV_DER" \
            -in .build/NexGenVideo.dmg | base64)"
          {
            echo "ED_SIGNATURE=$SIG"
            echo "DMG_LENGTH=$(stat -f%z .build/NexGenVideo.dmg)"
          } >> "$GITHUB_ENV"

      - name: Stage stable plugin publication transaction
        if: ${{ env.REL_DRY == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/plugins"
          PUBLICATION_DIR=".build/publication"
          PENDING_ASSET="catalog-${REL_VERSION}.pending.json"
          TRANSACTION_ASSET="release-${REL_VERSION}.transaction.json"
          mkdir -p "$PUBLICATION_DIR"

          if gh release view plugins \
            --repo "$GITHUB_REPOSITORY" \
            --json assets > "$PUBLICATION_DIR/assets.json" 2>/dev/null; then
            if jq -e 'any(.assets[]; .name == "catalog.json")' \
              "$PUBLICATION_DIR/assets.json" >/dev/null; then
              gh release download plugins \
                --repo "$GITHUB_REPOSITORY" \
                --pattern catalog.json \
                --dir "$PUBLICATION_DIR"
            else
              if jq -e 'any(.assets[]; .name | test("^release-.*[.]complete[.]json$"))' \
                "$PUBLICATION_DIR/assets.json" >/dev/null; then
                echo "::error::stable plugin catalog is missing after a completed publication"
                exit 1
              fi
              printf '%s\n' \
                '{"schema":"plugins/v2","plugins":[]}' \
                > "$PUBLICATION_DIR/catalog.json"
            fi
          else
            gh release create plugins \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "NexGenVideo — plugin channel" \
              --notes "Stable append-only plugin catalog."
            printf '%s\n' \
              '{"schema":"plugins/v2","plugins":[]}' \
              > "$PUBLICATION_DIR/catalog.json"
          fi
          python3 scripts/publish_plugin_catalog.py \
            .build/plugins \
            "$BASE" \
            "$PUBLICATION_DIR/$PENDING_ASSET" \
            --existing "$PUBLICATION_DIR/catalog.json"

          gh release upload plugins \
            --repo "$GITHUB_REPOSITORY" \
            .build/plugins/*-*.ngvpack.zip \
            --clobber
          if compgen -G ".build/plugins/*-*.badge.png" >/dev/null; then
            gh release upload plugins \
              --repo "$GITHUB_REPOSITORY" \
              .build/plugins/*-*.badge.png \
              --clobber
          fi

          python3 - \
            "$PUBLICATION_DIR/$TRANSACTION_ASSET" \
            "$REL_VERSION" \
            "$BUILD_NUMBER" \
            "$DMG_LENGTH" \
            "$ED_SIGNATURE" \
            "$(shasum -a 256 "$PUBLICATION_DIR/$PENDING_ASSET" | awk '{print $1}')" <<'PY'
          import json
          import glob
          import hashlib
          import os
          import sys

          path, version, build, length, signature, catalog_sha = sys.argv[1:]
          assets = []
          for pattern in (
              ".build/plugins/*-*.ngvpack.zip",
              ".build/plugins/*-*.badge.png",
          ):
              for asset_path in sorted(glob.glob(pattern)):
                  with open(asset_path, "rb") as handle:
                      digest = hashlib.sha256(handle.read()).hexdigest()
                  assets.append({
                      "name": os.path.basename(asset_path),
                      "sha256": digest,
                  })
          with open(path, "w", encoding="utf-8") as handle:
              json.dump({
                  "schema": "release-publication/1",
                  "version": version,
                  "tag": f"v{version}",
                  "build_number": build,
                  "dmg_length": length,
                  "ed_signature": signature,
                  "catalog_sha256": catalog_sha,
                  "assets": assets,
              }, handle, indent=2)
              handle.write("\n")
          PY
          gh release upload plugins \
            --repo "$GITHUB_REPOSITORY" \
            "$PUBLICATION_DIR/$PENDING_ASSET" \
            "$PUBLICATION_DIR/$TRANSACTION_ASSET" \
            --clobber

      - name: Upload dry-run candidate for manual verification
        if: ${{ env.REL_DRY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: NexGenVideo-${{ env.REL_VERSION }}-dry-run
          path: |
            .build/NexGenVideo.dmg
            .build/plugins/*.ngvpack.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub release + appcast
        if: ${{ env.REL_DRY == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$REL_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/NexGenVideo/Resources/Info.plist
          git commit -m "release: bump to $REL_VERSION (build ${BUILD_NUMBER})"
          git push origin "HEAD:${{ github.ref_name }}"
          # Packs are NOT attached here: they went to the `plugins` channel above, which is what the
          # app actually reads. Attaching them to the version tag is what created the illusion that a
          # release shipped a pack fix (#168).
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            .build/NexGenVideo.dmg \
            --title "NexGenVideo $TAG" \
            --notes "NexGenVideo $REL_VERSION (build ${BUILD_NUMBER})." \
            --target "$(git rev-parse HEAD)"
          python3 scripts/update_appcast.py \
            "$REL_VERSION" "$BUILD_NUMBER" "$DMG_LENGTH" "$ED_SIGNATURE" "$TAG"
          git add appcast.xml
          git commit -m "release: appcast for $TAG"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Promote stable plugin catalog
        if: ${{ env.REL_DRY == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PUBLICATION_DIR=".build/publication"
          PENDING_ASSET="catalog-${REL_VERSION}.pending.json"
          TRANSACTION_ASSET="release-${REL_VERSION}.transaction.json"
          COMPLETE_ASSET="release-${REL_VERSION}.complete.json"
          cp "$PUBLICATION_DIR/$PENDING_ASSET" "$PUBLICATION_DIR/catalog.json"
          for ATTEMPT in 1 2 3 4 5; do
            if gh release upload plugins \
              --repo "$GITHUB_REPOSITORY" \
              "$PUBLICATION_DIR/catalog.json" \
              --clobber; then
              break
            fi
            [ "$ATTEMPT" -lt 5 ] || exit 1
            sleep $((ATTEMPT * 2))
          done
          cp "$PUBLICATION_DIR/$TRANSACTION_ASSET" "$PUBLICATION_DIR/$COMPLETE_ASSET"
          gh release upload plugins \
            --repo "$GITHUB_REPOSITORY" \
            "$PUBLICATION_DIR/$COMPLETE_ASSET" \
            --clobber

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "${SIGN_KEYCHAIN:-}" 2>/dev/null || true
