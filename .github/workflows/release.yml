name: Release (signed + notarized)

# Signs with OUR Developer ID (cert imported into a temp keychain, identity auto-detected),
# notarizes via the App Store Connect API key, staples, builds a DMG, EdDSA-signs it for Sparkle,
# and publishes a GitHub release + appcast entry. No local build — everything runs here.
#
# Secrets (repo): MACOS_CERTIFICATE_P12_BASE64, MACOS_CERTIFICATE_PASSWORD, MACOS_NOTARY_KEY_ID,
# MACOS_NOTARY_ISSUER_ID, MACOS_NOTARY_KEY_P8_BASE64, SPARKLE_ED_PRIVATE_KEY (base64 of the DER
# Ed25519 private key; if absent, Sparkle signing + appcast are skipped).

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version X.Y.Z"
        required: true
        type: string
      dry_run:
        description: "Build + sign + notarize only (upload DMG artifact); skip release, appcast, commit"
        required: false
        default: true
        type: boolean
  # `workflow_dispatch` is the ONLY trigger. Nothing a commit, a merge, or a PR touches may start a
  # signed build — not the bundling scripts, not the pack manifests, not this file. A build happens
  # when a human asks for one, never as a side effect of changing code. Do not add `push:` or
  # `pull_request:` here: correctness of the app is verified by ci.yml (build + test) on every PR;
  # this workflow only produces and publishes artifacts, and that is a deliberate act.

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + mode
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "version must be X.Y.Z (got '$V')"; exit 1; }
          echo "REL_VERSION=$V" >> "$GITHUB_ENV"
          echo "REL_DRY=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
          echo "Building $V (dry=${{ inputs.dry_run }})"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import Developer ID cert into a temporary keychain
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PW" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/"//g')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/{print $2; exit}')"
          [ -n "$IDENTITY" ] || { echo "No 'Developer ID Application' identity in the .p12"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Prepare notary + Sparkle keys
        env:
          NOTARY_KEY_B64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          SPARKLE_PRIV_B64: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$NOTARY_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          {
            echo "NOTARY_KEY_FILE=$RUNNER_TEMP/notary.p8"
            echo "NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "NOTARY_ISSUER=$NOTARY_ISSUER"
          } >> "$GITHUB_ENV"
          if [ -n "${SPARKLE_PRIV_B64:-}" ]; then
            printf '%s' "$SPARKLE_PRIV_B64" | base64 --decode > "$RUNNER_TEMP/sparkle_priv.der"
            echo "SPARKLE_PRIV_DER=$RUNNER_TEMP/sparkle_priv.der" >> "$GITHUB_ENV"
          fi

      - name: Bump version
        run: |
          set -euo pipefail
          PLIST="Sources/NexGenVideo/Resources/Info.plist"
          CUR="$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")"
          NEW=$((CUR + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $REL_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" "$PLIST"
          echo "BUILD_NUMBER=$NEW" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple (DMG)
        run: scripts/bundle.sh release --dist

      - name: Verify signature + notarization
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 .build/NexGenVideo.app
          codesign --verify --strict --verbose=2 .build/NexGenVideo.app/Contents/Frameworks/libNexGenEngine.dylib
          xcrun stapler validate .build/NexGenVideo.app
          xcrun stapler validate .build/NexGenVideo.dmg
          spctl -a -vvv -t install .build/NexGenVideo.dmg || true

      - name: Assemble format packs (.ngvpack + catalog entry)
        run: |
          set -euo pipefail
          # Developer ID when the signing identity is present (it is on same-repo
          # runs); the assemble script falls back to ad-hoc otherwise.
          scripts/assemble_ngvpack.sh plugins/musicvideo.json release .build/plugins "${SIGN_IDENTITY:-}"
          ls -la .build/plugins

      - name: Publish packs to the stable plugin channel
        # The `plugins` release is the channel the app reads. It is NEVER deleted (unlike dev-latest,
        # which is delete+recreated on every build) and only ever appended to, and BOTH the dev-latest
        # and the versioned-release path publish here — so a versioned release can no longer ship a
        # pack fix the app never sees (#168).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/plugins"
          gh release view plugins >/dev/null 2>&1 || gh release create plugins \
            --prerelease --title "NexGenVideo — plugin channel" \
            --notes "The stable catalog the app reads. Append-only: every published pack version stays, so an older app keeps finding its last compatible pack. Not tied to the app release cycle."
          # Merge into what's already published — absent on the very first run.
          gh release download plugins -p catalog.json -D .build 2>/dev/null || true
          python3 scripts/publish_plugin_catalog.py .build/plugins "$BASE" .build/plugins/catalog.json \
            --existing .build/catalog.json
          # Version-stamped assets, so a published version's URL keeps addressing that version.
          gh release upload plugins .build/plugins/*-*.ngvpack.zip --clobber
          if compgen -G ".build/plugins/*-*.badge.png" >/dev/null; then
            gh release upload plugins .build/plugins/*-*.badge.png --clobber
          fi
          # The catalog goes last: it only ever advertises assets that are already uploaded.
          gh release upload plugins .build/plugins/catalog.json --clobber

      - name: EdDSA-sign DMG for Sparkle
        if: ${{ env.SPARKLE_PRIV_DER != '' }}
        run: |
          set -euo pipefail
          SIG="$(openssl pkeyutl -sign -rawin -keyform DER -inkey "$SPARKLE_PRIV_DER" \
            -in .build/NexGenVideo.dmg | base64)"
          {
            echo "ED_SIGNATURE=$SIG"
            echo "DMG_LENGTH=$(stat -f%z .build/NexGenVideo.dmg)"
          } >> "$GITHUB_ENV"

      - name: Publish signed build to rolling dev-latest
        # dev-latest is the rolling APP download only — packs live on the `plugins` channel (#168).
        if: ${{ env.REL_DRY == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete dev-latest --cleanup-tag --yes 2>/dev/null || true
          gh release create dev-latest \
            .build/NexGenVideo.dmg \
            --prerelease \
            --title "NexGenVideo — latest dev build" \
            --notes "Signed with our Developer ID (high5 ventures GmbH) and notarized by Apple — open the DMG and drag NexGenVideo to Applications. No Gatekeeper workaround needed. Format packs (.ngvpack) are fetched on demand from the \`plugins\` channel. Auto-built from \`${{ github.sha }}\`."

      - name: Publish GitHub release + appcast
        if: ${{ env.REL_DRY == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$REL_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/NexGenVideo/Resources/Info.plist
          git commit -m "release: bump to $REL_VERSION (build ${BUILD_NUMBER})"
          if [ -n "${ED_SIGNATURE:-}" ]; then
            python3 scripts/update_appcast.py "$REL_VERSION" "$BUILD_NUMBER" "$DMG_LENGTH" "$ED_SIGNATURE" "$TAG"
            git add appcast.xml
            git commit -m "release: appcast for $TAG"
          fi
          git push origin "HEAD:${{ github.ref_name }}"
          # Packs are NOT attached here: they went to the `plugins` channel above, which is what the
          # app actually reads. Attaching them to the version tag is what created the illusion that a
          # release shipped a pack fix (#168).
          gh release create "$TAG" \
            .build/NexGenVideo.dmg \
            --title "NexGenVideo $TAG" \
            --notes "NexGenVideo $REL_VERSION (build ${BUILD_NUMBER})." \
            --target "$(git rev-parse HEAD)"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "${SIGN_KEYCHAIN:-}" 2>/dev/null || true
