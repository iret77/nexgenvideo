section_arc:
  - role: establishing
    framing_hint: [wide, full]
    notes: "Theatralisch komponiertes Establishing — klare Silhouette, oft minimalistisches BG."
  - role: performance
    framing_hint: [ms, mcu]
    notes: "Charakter in Mittel-Distanz, Mimik klar lesbar."
  - role: reveal
    framing_hint: [cu, ecu]
    notes: "Augen-CU als Reaction-Beat, Gag- oder Schock-Pointe."
  - role: cutaway
    framing_hint: [insert, ots]
    notes: "Detail-Insert auf Prop, Sight-Gag oder Subtext-Element."

framing_mix:
  wide_pct: 15
  full_pct: 10
  ms_pct: 25
  mcu_pct: 20
  cu_pct: 15
  ecu_pct: 5
  ots_pct: 5
  pov_pct: 0
  insert_pct: 5
  aerial_pct: 0

asl_range:
  min_s: 1.0
  max_s: 5.0
  typical_s: 2.5

camera_vocabulary:
  - "static hold with theatrical staging"
  - "snap zoom on reaction"
  - "lateral pan revealing gag"
  - "match-cut on action"
  - "freeze-frame punctuation"

lighting_signature: |
  flat cel-lit with bold outlines and limited colour palette, single
  colour-keyed background per scene, hard cast shadows for dramatic
  beats, deliberate use of black silhouette against bright colour
  fields (Tartakovsky signature).

approximation_basis: |
  Aggregation of the cited Variety, Warner Bros Discovery press
  releases and the Adult Swim Annecy presentation. Tartakovsky's
  Samurai Jack and Primal serve as the framing-mix and pacing
  reference. Values are qualitative, derived from the cited sources
  describing his theatrical and minimalist visual approach.
