id: cartoon-adult-swim-tartakovsky
name: "Cartoon Adult-Swim — Tartakovsky/Roiland school"
description: |
  Westliche TV-Animation in der Adult-Swim-Tradition: limitierte
  2D-Cel-Animation, klare Linien, stark stilisierte Charakter-Designs,
  irrwitziger oder dunkler Humor, Action-Sequenzen mit "Tartakovsky-
  Composition" (theatralische Posen, klare Silhouetten). Empfohlen
  fuer ironische / surreal-komische / dunkel-humoristische Tracks mit
  cartoonigem Look.

triggers:
  visual_mediums: [2d_animation, illustration, mixed]
  moods: [high_energy, cinematic, narrative, aggressive, dreamy]
  tempo_bands: [medium, uptempo, fast]
  concept_types: [narrative, performance, abstract, hybrid]
  figures: [artist_only, artist_plus_others, others_only]
  aspect_ratios: []

references:
  - name: "Genndy Tartakovsky"
    role: director
    notable_works:
      - "Samurai Jack (2001-2017)"
      - "Genndy Tartakovsky's Primal (2019-)"
      - "Star Wars: Clone Wars (2003-2005)"
    sources:
      - label: "Variety — Genndy Tartakovsky Teases New Heist Series in Adult Swim Panel (2024)"
        url: "https://variety.com/2024/film/global/genndy-tartakovsky-musical-series-1236036232/"
      - label: "Warner Bros Discovery — Genndy Tartakovsky's Primal Returns to Adult Swim"
        url: "https://press.wbd.com/us/media-release/epic-saga-continues-emmyr-award-winning-series-genndy-tartakovskys-primal-returns"
      - label: "Warner Bros Discovery — Adult Swim Annecy International Animation Film Festival"
        url: "https://press.wbd.com/us/media-release/adult-swim-reveals-new-and-returning-series-and-forthcoming-special-featuring-top"
  - name: "Adult Swim animated series tradition"
    role: music_video
    notable_works:
      - "Rick and Morty (Justin Roiland, Dan Harmon)"
      - "Rick and Morty: The Anime (Takashi Sano, 2024)"
    sources:
      - label: "Warner Bros Discovery — Rick and Morty Season 8 (2025)"
        url: "https://press.wbd.com/us/media-release/adult-swim-0/season-eight-adult-swims-global-hit-series-rick-and-morty-arrives-may-25"
      - label: "Warner Bros Discovery — Rick and Morty: The Anime Premiere"
