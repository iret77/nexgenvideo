section_arc:
  - role: establishing
    framing_hint: [wide, aerial]
    notes: "Weite Wuesten-/Horizont-Aufnahme, oft mit einem markanten Element (Joshua Tree, Motel, Strommast)."
  - role: reveal
    framing_hint: [ms, mcu]
    notes: "Performer in der Landschaft eingeordnet, Mittel-Distanz."
  - role: detail
    framing_hint: [cu, ecu]
    notes: "Augen, Hand am Gitarrenhals, Sand, Wind-Haare — emotionale Naehe-Beats."
  - role: resolve
    framing_hint: [wide, full]
    notes: "Rueck zur Weite zum Schluss, Subject wieder klein in der Welt."

framing_mix:
  wide_pct: 20
  full_pct: 15
  ms_pct: 20
  mcu_pct: 15
  cu_pct: 15
  ecu_pct: 5
  ots_pct: 0
  pov_pct: 0
  insert_pct: 5
  aerial_pct: 5

asl_range:
  min_s: 3.0
  max_s: 12.0
  typical_s: 5.5

camera_vocabulary:
  - "static hold on horizon"
  - "slow lateral track across landscape"
  - "drone aerial reveal"
  - "rack-focus from sand to subject"
  - "single long crane move"

lighting_signature: |
  natural desert daylight, golden-hour heavy bias, hard shadows
  with deep contrast, deep blue sky, occasional black-and-white or
  sepia grade in Corbijn tradition, lens flare on direct sun.

approximation_basis: |
  Aggregation of the cited Wikipedia, uDiscoverMusic, Albumism,
  Secret Tours, Joshua Tree Earth and Sebastian Wintero pages
  describing Corbijn's Mojave shoots and the broader music-video
  Joshua-Tree filming tradition. Specific framing_mix derived
  qualitatively, not Cinemetrics-grade.
