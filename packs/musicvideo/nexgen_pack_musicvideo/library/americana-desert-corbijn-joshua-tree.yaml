id: americana-desert-corbijn-joshua-tree
name: "Americana Desert — Corbijn Joshua-Tree school"
description: |
  Weite, archetypisch-amerikanische Wuesten-Landschaft als emotionaler
  Anker. Vorbild Anton Corbijn's U2-Joshua-Tree-Visualbogen (1986)
  und die seither verbreitete Country-/Indie-Roadmovie-Aesthetik:
  Mojave-Vistas, Death Valley, Twentynine Palms, kleine Motels.
  Performer klein in der Welt, Architektur und Horizont tragen die
  Stimmung. Fuer Country-Rock, Indie-Folk, Americana-Tracks mit
  Roadmovie- oder Sehnsuchts-Bogen.

